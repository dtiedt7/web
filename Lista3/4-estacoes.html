<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Estações</title>
    <style>
        .box{
            width: 80px;
            height: 500px;
            overflow:hidden ;
            flex-grow: 1;
            border-radius: 30px;
            margin: 5px;
        }
        #container{
            display: flex;
            justify-content: space-around;
            flex-direction: row;
            align-items: center;
            height: 100vh;
        }
        .box:hover{
            width: 500px;
            flex-grow: 100;
            transition: 3s;
        }
        #img1{
            background-image: url("../imgs/inverno.jpg");
            background-size: cover;
        }
        #img2{
            background-image: url("../imgs/verao.jpg");
            background-size: cover;
        }
        #img3{
            background-image: url("../imgs/suiça.jpg");
            background-size: cover;
        }
        #img4{
            background-image: url("../imgs/primavera.jpg");
            background-size: cover;
        }
        #img5{
            background-image: url("../imgs/outono.jpg");
            background-size: cover;
        }
    </style>
</head>
<body>
    <div id="container">
        <div id="img1" class="box"></div>
        <div id="img2" class="box"></div>
        <div id="img3" class="box"></div>
        <div id="img4" class="box"></div>
        <div id="img5" class="box"></div>
    </div>
</body>
</html>

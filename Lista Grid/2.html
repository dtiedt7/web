<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Questão 2</title>
    <style>
        .container {
            display: grid;
            grid-template-areas: 
                "um um um"
                "dois tres tres"
                "dois quatro quatro";
            grid-template-rows: 1fr 4fr 1fr;
            grid-template-columns: 1fr 2fr 2fr;
            height: 100vh;
        }

        .box {
            border: 2px solid black;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        #box1 {
            grid-area: um;
            background-color: palevioletred;
        }

        #box2 {
            grid-area: dois;
            background-color: greenyellow;
        }

        #box3 {
            grid-area: tres;
            background-color: orange;
            display: flex;
            flex-direction: column;
            justify-content: flex-start;
            align-items: center;
            padding: 20px;
            gap: 15px;
        }

        #box4 {
            grid-area: quatro;
            background-color: darkcyan;
        }

        .linhas {
            display: flex;
            flex-direction: row;
            align-items: flex-start;
            gap: 20px;
            width: 90%;
        }

        #quadro {
            width: 150px;
            height: 120px;
            border: 3px solid black;
        }

        .linhaLado {
            display: flex;
            flex-direction: column;
            flex-grow: 1;
            gap: 10px;
        }

        .linha {
            height: 2px;
            background-color: black;
            width: 100%;
        }

        .linhasBaixo {
            display: flex;
            flex-direction: column;
            gap: 10px;
            width: 90%;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="box" id="box1"><h1>Header</h1></div>
        <div class="box" id="box2"><h1>Nav</h1></div>
        <div class="box" id="box3">
            <h1>Content</h1>
            <div class="linhas">
                <div id="quadro"></div>
                <div class="linhaLado">
                    <div class="linha"></div>
                    <div class="linha"></div>
                    <div class="linha"></div>
                    <div class="linha"></div>
                    <div class="linha"></div>
                    <div class="linha"></div>
                    <div class="linha"></div>
                    <div class="linha"></div>
                    <div class="linha"></div>
                    <div class="linha"></div>
                    <div class="linha"></div>
                </div>
            </div>
            <div class="linhasBaixo">
                <div class="linha"></div>
                <div class="linha"></div>
                <div class="linha"></div>
            </div>
        </div>
        <div class="box" id="box4"><h1>Footer</h1></div>
    </div>
</body>
</html>

<!DOCTYPE html>
<html>
<head>
    <style>
        *{margin: 0px; padding: 0px;}
        body{height: 100vh;
        width: 100vw;
    }
        .box{
            box-sizing: border-box;
            border: 1px solid black;
            height: 25vh;
            width: 25vw;
            text-align: center;
            line-height: 25vh;
            display: inline-block;
            position: fixed;
        }
        #box1{
            background-color: blue;
            left: 0px;
            top: 0px;
        }
        #box2{
            background-color: green;
            right: 0px;
        }
        #box3{
            background-color: red;
            right: 0px;
            bottom: 0px;
        }
        #box4{
            background-color: yellow;
            bottom: 0px;
            /*animation: rotacao 5s linear 0s infinite;**/
        }
        #box5{
            background-color: cadetblue;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            /* animation: name duration timing-function delay itiration-count direction fill-mode;**/
        }
        /*@keyframes rotacao {
            0%{}
            100%{transform: rotate(360deg);}
        }
        @keyframes lancamento {
            0%{bottom: 0;}
            100%{top: 0; left: 700px;}
        }
        **/
    </style>
    <title>4c display</title>
</head>
<body>
<div id="box1" class="box">1</div><div id="box2" class="box">2</div><div id="box3" class="box">3</div><div id="box4" class="box">4</div><div id="box5" class="box">5</div>
</body>
</html>

<!DOCTYPE html>
<html>
<head>
    <style>
        *{margin: 0px; padding: 0px;}
        body{min-height: 100vh;
        min-width: 100vw;
    }
        .box{
            box-sizing: border-box;
            border: 1px solid black;
            height: 100vh;
            width: 25vw;
            text-align: center;
            line-height: 100vh;
            display: inline-block;
        }
        #box1{
            background-color: blue;
        }
        #box2{
            background-color: green;
        }
        #box3{
            background-color: red;
        }
        #box4{
            background-color: yellow;
        }

    </style>
    <title>4b display</title>
</head>
<body>
<div id="box1" class="box">1</div><div id="box2" class="box">2</div><div id="box3" class="box">3</div><div id="box4" class="box">4</div>
</body>
</html>

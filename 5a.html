<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Questão 5</title>

<style>
body{
    margin: 0;
}

.container{
    display: grid;
    height: 100vh;
    width: 100vw;
    gap: 5px;

    grid-template-columns: 2fr 2fr 2fr 2fr 1fr;
    grid-template-rows: 1fr 1fr 1fr;

    grid-template-areas:
    "um um dois tres tres"
    "quatro quatro dois cinco bolinhas"
    "seis seis seis cinco bolinhas";
}

.box{
    border: 2px solid white;
}

#box1{ grid-area: um; background-color: orange; }
#box2{ grid-area: dois; background-color: pink; }
#box3{ grid-area: tres; background-color: lightblue; }
#box4{ grid-area: quatro; background-color: grey; }
#box5{ grid-area: cinco; background-color: yellowgreen; }
#box6{ grid-area: seis; background-color: goldenrod; }

.bolinhas{
    grid-area: bolinhas;
    display: flex;
    flex-direction: column;
    justify-content: space-around;
    align-items: center;
    background-color: #eee;
    grid-area: bolinhas;
}

.bola{
    width: 40px;
    height: 40px;
    border-radius: 50%;
}

#b1{ background-color: orange; }
#b2{ background-color: pink; }
#b3{ background-color: yellowgreen; }
#b4{ background-color: lightblue; }

</style>
</head>

<body>

<div class="container">
    <div class="box" id="box1"></div>
    <div class="box" id="box2"></div>
    <div class="box" id="box3"></div>
    <div class="box" id="box4"></div>
    <div class="box" id="box5"></div>
    <div class="box" id="box6"></div>

    <div class="bolinhas">
        <div class="bola" id="b1"></div>
        <div class="bola" id="b2"></div>
        <div class="bola" id="b3"></div>
        <div class="bola" id="b4"></div>
</div>

</body>
</html>

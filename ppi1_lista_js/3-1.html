<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        #box{
            display: flex;
            width: 100px;
            flex-direction: column;   
        }
    </style>
</head>
<body>
    <H1>soma de numeros na interface</H1>

    <label for="entradaA">A</label>
    <input type="number" name="" id="entradaA">

    <label for="entradaB">B</label>
    <input type="number" name="" id="entradaB">
    

    <span>=</span>
    <span id="resultado"></span>
    <br><br>
    <div id="box">
        <button id="botao">Somar</button>
    </div>

<script>
    let a,b;
    let inputA=document.querySelector("#entradaA");
    let inputB=document.querySelector("#entradaB");
    let button=document.querySelector("#botao");

    button.addEventListener("click", ()=>{
        
        a= Number(inputA.value);
        b= Number(inputB.value);
        let soma= a+b;

        let spanResult=document.querySelector("#resultado");
        spanResult.innerHTML=soma;
    })

    
    
</script>
</body>
</html>
